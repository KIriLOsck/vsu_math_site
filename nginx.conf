worker_processes  2;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    server {
        listen 80;
        
        location / {
            root /usr/share/static;
            index index.html;
        }

        location /api {
            proxy_pass http://backend:8000;
        }
    }
}
